<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宁德KPI - 体验模块看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1923;--card:#1a2736;--card2:#1e3044;--border:#2a4055;
  --text:#e0e8f0;--text2:#8ba4be;--text3:#5a7a9a;
  --green:#00d68f;--red:#ff6b6b;--yellow:#ffc107;--blue:#4dabf7;--purple:#9775fa;--orange:#ff922b;
  --jm:#4dabf7;--zb:#9775fa;--yp:#20c997;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:16px;min-height:100vh}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.header h1{font-size:22px;font-weight:700;color:var(--text)}
.header .sub{font-size:13px;color:var(--text2)}
.date-nav{display:flex;gap:6px;align-items:center}
.date-nav button{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .2s}
.date-nav button:hover{background:var(--border)}
.date-nav button.active{background:var(--blue);border-color:var(--blue);color:#fff}

/* 月度总览卡片 */
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.s-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.s-card .label{font-size:12px;color:var(--text2);margin-bottom:6px}
.s-card .val{font-size:28px;font-weight:700}
.s-card .target{font-size:11px;color:var(--text3);margin-top:4px}
.s-card.good .val{color:var(--green)}
.s-card.bad .val{color:var(--red)}
.s-card.warn .val{color:var(--yellow)}
.s-card .progress{height:6px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden}
.s-card .progress .bar{height:100%;border-radius:3px;transition:width .5s}

/* 体验得分详情 */
.score-detail{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px}
.score-detail h2{font-size:16px;margin-bottom:16px;color:var(--text2)}
.score-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.score-item{background:var(--card2);border-radius:8px;padding:14px}
.score-item .si-label{font-size:13px;color:var(--text2);margin-bottom:8px}
.score-item .si-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:13px}
.score-item .si-val{font-weight:600}
.score-item .si-score{font-size:20px;font-weight:700;color:var(--blue);text-align:center;margin-top:6px}

/* 双列布局 */
.dual-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:900px){.dual-col{grid-template-columns:1fr}}

.chart-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.chart-box h3{font-size:14px;color:var(--text2);margin-bottom:12px}
.chart-wrap{position:relative;height:280px}

/* 自定义滚动条 */
.table-section::-webkit-scrollbar{height:6px}
.table-section::-webkit-scrollbar-track{background:var(--border);border-radius:3px}
.table-section::-webkit-scrollbar-thumb{background:var(--text3);border-radius:3px}
.table-section::-webkit-scrollbar-thumb:hover{background:var(--text2)}

/* 双列布局中宽表格紧凑显示 */
.dual-col .table-section table{font-size:11px}
.dual-col .table-section th,.dual-col .table-section td{padding:5px 6px}

/* 固定首列，水平滚动时保持可见 */
.table-section table th:first-child,.table-section table td:first-child{position:sticky;left:0;z-index:2}
.table-section table th:first-child{background:var(--card2);z-index:3}
.table-section table td:first-child{background:var(--card)}
.table-section table tr:hover td:first-child{background:rgba(77,171,247,.12)}

/* 数据表格 */
.table-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px;overflow-x:auto}
.table-section h3{font-size:14px;color:var(--text2);margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--card2);color:var(--text2);padding:8px 10px;text-align:center;border-bottom:2px solid var(--border);position:sticky;top:0;white-space:nowrap}
td{padding:7px 10px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap}
tr:hover{background:rgba(77,171,247,.08)}
td.good{color:var(--green)}
td.bad{color:var(--red)}
td.neutral{color:var(--text2)}
.col-header{background:var(--card2);font-weight:600;color:var(--text)}
.cat-jm{background:rgba(77,171,247,.15);color:var(--jm)}
.cat-zb{background:rgba(151,117,250,.15);color:var(--zb)}
.cat-yp{background:rgba(32,201,151,.15);color:var(--yp)}

/* 日期切换的高亮 */
.today-row{background:rgba(77,171,247,.1)}

/* 口径说明 */
.caveat{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:0 10px 10px 0;padding:14px 18px;margin-bottom:20px;font-size:12px;color:var(--text2);line-height:1.8}
.caveat strong{color:var(--text)}

/* 标签 */
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-jm{background:rgba(77,171,247,.2);color:var(--jm)}
.tag-zb{background:rgba(151,117,250,.2);color:var(--zb)}
.tag-yp{background:rgba(32,201,151,.2);color:var(--yp)}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>宁德KPI - 体验模块看板</h1>
    <div class="sub" id="headerSub">数据来源：履约数据考核看板（合作商用）| 67列KPI拆解</div>
  </div>
  <div class="date-nav" id="dateNav"></div>
</div>

<div class="caveat">
  <strong>体验模块满分15分</strong> = 复合超时率(6分) × 得分率 + 虚假点送达(4.5分) × 得分率 + 配送取消(4.5分) × 得分率<br>
  <strong>得分率</strong> = 目标值 / 实际值（越低越好），capped at [0, 1.1]<br>
  <strong>复合超时</strong> = 全渠道(加盟+普通众包+悦跑)绝对超时单 / 配送完成单量，分3km内外<br>
  <strong>数据口径</strong>：体验表原始67列，复合超时用绝对口径（col47-67），非相对口径（col9-40）
</div>

<div id="summaryCards" class="summary-row"></div>

<div id="scoreDetail" class="score-detail"></div>

<div class="dual-col">
  <div class="chart-box">
    <h3>复合超时率趋势（分距离）</h3>
    <div class="chart-wrap"><canvas id="chartOt"></canvas></div>
  </div>
  <div class="chart-box">
    <h3>虚假点送达率 + 配送取消率趋势</h3>
    <div class="chart-wrap"><canvas id="chartFakeCancel"></canvas></div>
  </div>
</div>

<div class="dual-col">
  <div class="chart-box">
    <h3>各渠道绝对超时率趋势</h3>
    <div class="chart-wrap"><canvas id="chartOtByCat"></canvas></div>
  </div>
  <div class="chart-box">
    <h3>体验得分趋势</h3>
    <div class="chart-wrap"><canvas id="chartScore"></canvas></div>
  </div>
</div>

<div id="dailyTable" class="table-section"></div>

<div class="dual-col">
  <div id="jmTable" class="table-section"></div>
  <div id="zbTable" class="table-section"></div>
</div>
<div id="ypTable" class="table-section"></div>

const daily = EXP_DATA.daily;
const monthly = EXP_DATA.monthly;
const T = EXP_DATA.targets;

// ====== DATE NAV ======
let selectedIdx = daily.length - 1;
const nav = document.getElementById('dateNav');
daily.forEach((d, i) => {
  const btn = document.createElement('button');
  btn.textContent = d.date_label;
  btn.onclick = () => { selectedIdx = i; renderAll(); };
  btn.id = 'navBtn' + i;
  nav.appendChild(btn);
});

function renderAll() {
  renderNav();
  renderSummary();
  renderScoreDetail();
  renderCharts();
  renderDailyTable();
  renderCatTable('jm', '加盟(城代)');
  renderCatTable('zb', '普通众包');
  renderCatTable('yp', '悦跑');
}

function renderNav() {
  daily.forEach((_, i) => {
    document.getElementById('navBtn' + i).classList.toggle('active', i === selectedIdx);
  });
}

// ====== SUMMARY CARDS ======
function renderSummary() {
  const d = daily[selectedIdx];
  const k = d.kpi;
  const s = d.score;
  const cards = [
    { label: '复合超时 3km内', val: k.ot_abs_3in_pct, target: (T.ot_3km_in_target*100).toFixed(3)+'%', good: k.ot_abs_3in <= T.ot_3km_in_target, cls: '' },
    { label: '复合超时 3km外', val: k.ot_abs_3out_pct, target: (T.ot_3km_out_target*100).toFixed(3)+'%', good: k.ot_abs_3out <= T.ot_3km_out_target, cls: '' },
    { label: '虚假点送达率', val: k.fake_pct, target: (T.fake_target*100).toFixed(3)+'%', good: k.fake_rate <= T.fake_target, cls: '' },
    { label: '配送取消率', val: k.cancel_pct, target: (T.cancel_target*100).toFixed(3)+'%', good: k.cancel_rate <= T.cancel_target, cls: '' },
    { label: '推单完成率', val: k.push_rate_pct, target: (T.push_target*100).toFixed(2)+'%', good: k.push_rate >= T.push_target, cls: '' },
    { label: '体验模块得分', val: s.total_exp_score.toFixed(2), target: '15分', good: s.total_exp_score >= 13.5, cls: '' },
  ];
  document.getElementById('summaryCards').innerHTML = cards.map(c => {
    const pct = parseFloat(c.val) || 0;
    const tpct = parseFloat(c.target) || 1;
    const barW = Math.min(pct/tpct*100, 120);
    return `<div class="s-card ${c.good?'good':'bad'}">
      <div class="label">${c.label}</div>
      <div class="val">${c.val}</div>
      <div class="target">目标: ${c.target} ${c.good?'达标':'未达标'}</div>
      <div class="progress"><div class="bar" style="width:${barW}%;background:${c.good?'var(--green)':'var(--red)'}"></div></div>
    </div>`;
  }).join('');
}

// ====== SCORE DETAIL ======
function renderScoreDetail() {
  const s = daily[selectedIdx].score;
  document.getElementById('scoreDetail').innerHTML = `
    <h2>体验得分拆解 (${daily[selectedIdx].date_label})</h2>

        <div class="si-row"><span>3km外完成率</span><span class="si-val" style="color:${s.ot_out_comp>=1?'var(--green)':'var(--red)'}">${(s.ot_out_comp*100).toFixed(1)}%</span></div>
        <div class="si-row"><span>得分率</span><span class="si-val">${(s.ot_score_rate*100).toFixed(1)}%</span></div>
        <div class="si-score">${s.ot_score.toFixed(2)}</div>
      </div>
      <div class="score-item">
        <div class="si-label">虚假点送达 (满分4.5分)</div>

        <div class="si-row"><span>得分率</span><span class="si-val">${(s.fake_score_rate*100).toFixed(1)}%</span></div>
        <div class="si-score">${s.fake_score.toFixed(2)}</div>
      </div>
      <div class="score-item">
        <div class="si-label">配送取消 (满分4.5分)</div>
        <div class="si-row"><span>完成率</span><span class="si-val" style="color:${s.cancel_comp>=1?'var(--green)':'var(--red)'}">${(s.cancel_comp*100).toFixed(1)}%</span></div>
        <div class="si-row"><span>得分率</span><span class="si-val">${(s.cancel_score_rate*100).toFixed(1)}%</span></div>
        <div class="si-score">${s.cancel_score.toFixed(2)}</div>
      </div>
      <div class="score-item" style="border-left:3px solid var(--blue)">
        <div class="si-label">体验模块总分</div>
        <div class="si-row"><span>超时 + 虚假点 + 配取</span><span class="si-val">${s.ot_score.toFixed(2)} + ${s.fake_score.toFixed(2)} + ${s.cancel_score.toFixed(2)}</span></div>
        <div class="si-score" style="font-size:28px">${s.total_exp_score.toFixed(2)}<span style="font-size:14px;color:var(--text2)"> / 15</span></div>
      </div>
    </div>`;
}

// ====== CHARTS ======
let chartOt, chartFC, chartOtCat, chartScore;
function renderCharts() {
  const labels = daily.map(d => d.date_label);
  
  if (chartOt) chartOt.destroy();
  chartOt = new Chart(document.getElementById('chartOt'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '3km内超时率', data: daily.map(d=>(d.kpi.ot_abs_3in*100)), borderColor: var_blue(), backgroundColor: 'rgba(77,171,247,.1)', fill: true, tension: .3, pointRadius: 3 },
        { label: '3km外超时率', data: daily.map(d=>(d.kpi.ot_abs_3out*100)), borderColor: var_orange(), backgroundColor: 'rgba(255,146,43,.1)', fill: true, tension: .3, pointRadius: 3 },
        { label: '目标3km内', data: Array(labels.length).fill(T.ot_3km_in_target*100), borderColor: var_blue(), borderDash: [6,4], borderWidth: 1, pointRadius: 0 },
        { label: '目标3km外', data: Array(labels.length).fill(T.ot_3km_out_target*100), borderColor: var_orange(), borderDash: [6,4], borderWidth: 1, pointRadius: 0 },
      ]
    },
    options: chartOpts('%')
  });

  if (chartFC) chartFC.destroy();
  chartFC = new Chart(document.getElementById('chartFakeCancel'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '虚假点送达率', data: daily.map(d=>(d.kpi.fake_rate*100)), borderColor: var_red(), tension: .3, pointRadius: 3, yAxisID: 'y' },
        { label: '配送取消率', data: daily.map(d=>(d.kpi.cancel_rate*100)), borderColor: var_purple(), tension: .3, pointRadius: 3, yAxisID: 'y' },
        { label: '虚假点目标', data: Array(labels.length).fill(T.fake_target*100), borderColor: var_red(), borderDash: [6,4], borderWidth: 1, pointRadius: 0 },
        { label: '配取目标', data: Array(labels.length).fill(T.cancel_target*100), borderColor: var_purple(), borderDash: [6,4], borderWidth: 1, pointRadius: 0 },
      ]
    },
    options: chartOpts('%')
  });

  // 各渠道超时率
  if (chartOtCat) chartOtCat.destroy();
  chartOtCat = new Chart(document.getElementById('chartOtByCat'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '加盟绝对超时率', data: daily.map(d => {
          const r=d.raw.jm; return r.complete>0?((r.abs_gen_3in+r.abs_sev_3in+r.abs_gen_3out+r.abs_sev_3out)/r.complete*100):0;
        }), borderColor: '#4dabf7', tension: .3, pointRadius: 3 },
        { label: '普通众包绝对超时率', data: daily.map(d => {
          const r=d.raw.zb; return r.complete>0?((r.abs_gen_3in+r.abs_sev_3in+r.abs_gen_3out+r.abs_sev_3out)/r.complete*100):0;
        }), borderColor: '#9775fa', tension: .3, pointRadius: 3 },
        { label: '悦跑绝对超时率', data: daily.map(d => {
          const r=d.raw.yp; return r.complete>0?((r.abs_gen_3in+r.abs_sev_3in+r.abs_gen_3out+r.abs_sev_3out)/r.complete*100):0;
        }), borderColor: '#20c997', tension: .3, pointRadius: 3 },
      ]
    },
    options: chartOpts('%')
  });

  if (chartScore) chartScore.destroy();
  chartScore = new Chart(document.getElementById('chartScore'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '体验得分', data: daily.map(d=>d.score.total_exp_score), backgroundColor: daily.map(d=>d.score.total_exp_score>=15?'rgba(0,214,143,.6)':'rgba(255,107,107,.6)'), borderRadius: 4 },
        { label: '满分15', data: Array(labels.length).fill(15), type: 'line', borderColor: '#fff', borderDash: [6,4], borderWidth: 1, pointRadius: 0 },
      ]
    },
    options: chartOpts('分')
  });
}

function chartOpts(unit) {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { color: '#8ba4be', font: { size: 11 } } } },
    scales: {
      x: { ticks: { color: '#5a7a9a', font: { size: 11 } }, grid: { color: 'rgba(42,64,85,.3)' } },
      y: { ticks: { color: '#5a7a9a', font: { size: 11 }, callback: v => v.toFixed(2)+unit }, grid: { color: 'rgba(42,64,85,.3)' } }
    }
  };
}
function var_blue(){return'#4dabf7'} function var_orange(){return'#ff922b'}
function var_red(){return'#ff6b6b'} function var_purple(){return'#9775fa'} function var_green(){return'#00d68f'}

// ====== DAILY TABLE ======
function renderDailyTable() {
  const rows = daily.map((d,i) => {
    const k=d.kpi, s=d.score;
    const cls = i===selectedIdx?'today-row':'';
    return `<tr class="${cls}">
      <td><button onclick="selectedIdx=${i};renderAll()" style="background:none;border:none;color:var(--blue);cursor:pointer;font-size:12px;text-decoration:underline">${d.date_label}</button></td>
      <td>${(d.raw.jm.push+d.raw.zb.push+d.raw.yp.push).toLocaleString()}</td>
      <td>${(d.raw.jm.complete+d.raw.zb.complete+d.raw.yp.complete).toLocaleString()}</td>
      <td class="${k.ot_abs_3in<=T.ot_3km_in_target?'good':'bad'}">${k.ot_abs_3in_pct}</td>
      <td class="${k.ot_abs_3out<=T.ot_3km_out_target?'good':'bad'}">${k.ot_abs_3out_pct}</td>
      <td class="${k.fake_rate<=T.fake_target?'good':'bad'}">${k.fake_pct}</td>
      <td class="${k.cancel_rate<=T.cancel_target?'good':'bad'}">${k.cancel_pct}</td>
      <td class="${k.push_rate>=T.push_target?'good':'bad'}">${k.push_rate_pct}</td>
      <td style="font-weight:700;color:${s.total_exp_score>=15?'var(--green)':'var(--yellow)'}">${s.total_exp_score.toFixed(2)}</td>
    </tr>`;
  });
  // 月度汇总行
  const mk = monthly;
  const mScore = monthly.score;
  const rows2 = `<tr style="font-weight:700;border-top:2px solid var(--blue);background:rgba(77,171,247,.08)">
    <td>月度汇总</td>
    <td>${mk.total_push.toLocaleString()}</td>
    <td>${mk.total_complete.toLocaleString()}</td>
    <td class="${mk.ot_abs_3in<=T.ot_3km_in_target?'good':'bad'}">${(mk.ot_abs_3in*100).toFixed(2)}%</td>
    <td class="${mk.ot_abs_3out<=T.ot_3km_out_target?'good':'bad'}">${(mk.ot_abs_3out*100).toFixed(2)}%</td>
    <td class="${mk.fake_rate<=T.fake_target?'good':'bad'}">${(mk.fake_rate*100).toFixed(4)}%</td>
    <td class="${mk.cancel_rate<=T.cancel_target?'good':'bad'}">${(mk.cancel_rate*100).toFixed(4)}%</td>
    <td>—</td>
    <td style="color:${mScore.total_exp_score>=15?'var(--green)':'var(--yellow)'}">${mScore.total_exp_score.toFixed(2)}</td>
  </tr>`;
  
  document.getElementById('dailyTable').innerHTML = `
    <h3>每日体验KPI总览</h3>
    <table>
      <tr>
        <th>日期</th><th>总推单</th><th>总完成</th>
        <th>超时3km内</th><th>超时3km外</th>
        <th>虚假点率</th><th>配取率</th>
        <th>推完率</th><th>体验分</th>
      </tr>
      ${rows.join('')}
      ${rows2}
    </table>`;
}

// ====== CATEGORY TABLE ======
function renderCatTable(cat, catLabel) {
  const tagCls = cat==='jm'?'jm':cat==='zb'?'zb':'yp';
  const rows = daily.map((d,i) => {
    const r=d.raw[cat];
    const cls = i===selectedIdx?'today-row':'';
    const absRate = r.complete>0?((r.abs_gen_3in+r.abs_sev_3in+r.abs_gen_3out+r.abs_sev_3out)/r.complete*100):0;
    return `<tr class="${cls}">
      <td>${d.date_label}</td>
      <td>${r.push.toLocaleString()}</td>
      <td>${r.complete.toLocaleString()}</td>
      <td>${r.complete_3in.toLocaleString()}</td>
      <td>${r.complete_3out.toLocaleString()}</td>
      <td>${r.rel_gen}</td>
      <td>${r.rel_sev}</td>
      <td>${r.abs_total}</td>
      <td>${absRate.toFixed(2)}%</td>
      <td>${r.cancel}</td>
      <td>${r.fake}</td>
    </tr>`;
  });
  
  document.getElementById(cat+'Table').innerHTML = `
    <h3><span class="tag tag-${tagCls}">${catLabel}</span> 每日明细</h3>
    <table>
      <tr>
        <th>日期</th><th>推单</th><th>完成</th><th>完成3km内</th><th>完成3km外</th>
        <th>相对一般超时</th><th>相对严重超时</th><th>绝对超时</th><th>绝对超时率</th>
        <th>配送取消</th><th>虚假点送达</th>
      </tr>
      ${rows.join('')}
    </table>`;
}

// ====== INIT ======
renderAll();
</script>
